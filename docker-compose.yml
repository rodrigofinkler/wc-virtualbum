services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: stickers
      POSTGRES_USER: stickers
      POSTGRES_PASSWORD: stickers
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://stickers:stickers@db:5432/stickers

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
